name: QA Tests - Agibank

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  api-tests:
    name: API Tests (Java + RestAssured)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run API Tests
        working-directory: qa-api
        run: mvn test

      - name: Generate Allure Report
        working-directory: qa-api
        run: mvn allure:report
        if: always()

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: qa-api/target/site/allure-maven-plugin/

  performance-tests:
    name: Performance Tests (JMeter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Create results folder
        run: mkdir -p qa-performance/results

      - name: Run Load Test
        run: |
          jmeter -n \
            -t qa-performance/blazedemo-load-test.jmx \
            -l qa-performance/results/load.jtl \
            -e -o qa-performance/results/load-report \
            -Jjmeter.save.saveservice.output_format=csv

      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report
          path: qa-performance/results/load-report/

  web-tests:
    name: Web Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: qa-web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: qa-web
        run: npx playwright install --with-deps chromium

      - name: Run Web Tests
        working-directory: qa-web
        run: npx playwright test
        continue-on-error: false
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: qa-web/playwright-report/
