name: QA Tests - Agibank

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  api-tests:
    name: API Tests (Java + RestAssured)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run API Tests
        working-directory: qa-api
        run: mvn test

      - name: Generate Allure Report
        working-directory: qa-api
        run: mvn allure:report
        if: always()

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: qa-api/target/site/allure-maven-plugin/

  web-tests:
    name: Web Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qa-web/package-lock.json

      - name: Install dependencies
        working-directory: qa-web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: qa-web
        run: npx playwright install --with-deps chromium

      - name: Run Web Tests
        working-directory: qa-web
        run: npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: qa-web/playwright-report/
